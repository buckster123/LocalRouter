name: Build and push Docker images

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - Dockerfile.builder
      - launch.sh
      - .github/workflows/build.yml
  workflow_dispatch:
    inputs:
      push:
        description: 'Push images to ghcr.io'
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/vastai-gguf

jobs:
  build:
    name: Build ${{ matrix.variant.tag }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        variant:
          - tag: prebuilt
            dockerfile: Dockerfile
            cuda_version: "12.8.0"
            platforms: linux/amd64
          - tag: builder
            dockerfile: Dockerfile.builder
            cuda_version: "12.8.0"
            platforms: linux/amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}
          tags: |
            type=raw,value=${{ matrix.variant.tag }}
            type=raw,value=${{ matrix.variant.tag }}-{{date 'YYYYMMDD'}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.variant.dockerfile }}
          platforms: ${{ matrix.variant.platforms }}
          push: ${{ github.event_name == 'push' || inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CUDA_VERSION=${{ matrix.variant.cuda_version }}
          cache-from: type=gha,scope=${{ matrix.variant.tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant.tag }}
