# recipes.toml — model + GPU recipe catalogue for vastai-gguf-launcher
#
# Edit this file to add your own models/quants. The manager and launch scripts
# read recipes from here — no Python or bash editing needed for new models.
#
# Each [[recipes]] entry defines a named configuration. The manager groups them
# by gpu so the launch wizard shows only compatible recipes.
#
# Required fields:  name, label, gpu, model_repo, model_quant, ctx
# Optional fields:  parallel (default 1), kv_type (default q8_0),
#                   min_disk_gb (default 60), description
#
# GPU values must match the gpu_tiers keys below: 5090 | 4090 | 6000pro
# (extend gpu_tiers if you need other cards)

# ── docker image ──────────────────────────────────────────────────────────────
[docker]
# The container image that will be pulled on the Vast instance.
# Must expose an OpenAI-compatible /v1 endpoint on port 8000.
# Default: the prebuilt llama.cpp + hf-transfer image from this repo.
# Build your own:  docker build -t ghcr.io/<you>/vastai-gguf:latest .
#                  docker push ghcr.io/<you>/vastai-gguf:latest
#                  (make the package public on GitHub)
image = "ghcr.io/buckster123/qwen36-llamacpp:latest"

# ── price / disk ceilings per GPU tier ────────────────────────────────────────
[gpu_tiers.5090]
max_price   = "0.55"
min_disk_gb = 60
label       = "RTX 5090 32GB   (~$0.34/hr)"

[gpu_tiers.4090]
max_price   = "0.45"
min_disk_gb = 60
label       = "RTX 4090 24GB   (~$0.28/hr)"

[gpu_tiers.6000pro]
max_price   = "1.60"
min_disk_gb = 80
label       = "RTX PRO 6000 96GB (~$0.93/hr)"

# ── recipes ───────────────────────────────────────────────────────────────────
# Qwen3.6 27B dense — RTX 5090

[[recipes]]
name        = "qwen36-27b-q6-5090"
label       = "Qwen3.6-27B  Q6_K  96K ctx"
gpu         = "5090"
model_repo  = "unsloth/Qwen3.6-27B-GGUF"
model_quant = "UD-Q6_K_XL"
ctx         = 98304
parallel    = 1
kv_type     = "q8_0"
description = "Dense 27B at near-lossless quality. Best single-user throughput on 5090."

# Qwen3.6 35B-A3B MoE — RTX 5090

[[recipes]]
name        = "qwen36-35b-moe-q5-5090"
label       = "Qwen3.6-35B-A3B MoE  Q5_K  128K ctx"
gpu         = "5090"
model_repo  = "unsloth/Qwen3.6-35B-A3B-GGUF"
model_quant = "UD-Q5_K_XL"
ctx         = 131072
parallel    = 1
kv_type     = "q8_0"
description = "MoE 35B at Q5. Hybrid-linear attention — only 10/40 layers use full KV. Great throughput/quality tradeoff."

[[recipes]]
name        = "qwen36-35b-moe-256k-5090"
label       = "Qwen3.6-35B-A3B MoE  Q5_K  256K ctx  (tight)"
gpu         = "5090"
model_repo  = "unsloth/Qwen3.6-35B-A3B-GGUF"
model_quant = "UD-Q5_K_XL"
ctx         = 262144
parallel    = 1
kv_type     = "q4_0"
description = "256K context on 32GB by dropping KV quant to q4_0. ~27GiB total. Solo slot only."

# Qwen3.6 27B dense — RTX 4090

[[recipes]]
name        = "qwen36-27b-q4-4090"
label       = "Qwen3.6-27B  Q4_K  64K ctx"
gpu         = "4090"
model_repo  = "unsloth/Qwen3.6-27B-GGUF"
model_quant = "UD-Q4_K_XL"
ctx         = 65536
parallel    = 1
kv_type     = "q8_0"
description = "Dense 27B at Q4 quality on the 4090's 24GB. Good value at ~$0.28/hr."

# Qwen3.6 35B-A3B MoE — RTX 4090

[[recipes]]
name        = "qwen36-35b-moe-q4-4090"
label       = "Qwen3.6-35B-A3B MoE  Q4_K  48K ctx"
gpu         = "4090"
model_repo  = "unsloth/Qwen3.6-35B-A3B-GGUF"
model_quant = "UD-Q4_K_XL"
ctx         = 49152
parallel    = 1
kv_type     = "q8_0"
description = "MoE 35B on 4090. Tight fit but works — hybrid-linear KV saves the day."

# Qwen3.6 35B-A3B MoE — RTX PRO 6000 96GB (THE BEAST)

[[recipes]]
name        = "qwen36-35b-moe-beast-6000pro"
label       = "Qwen3.6-35B-A3B MoE  Q8_K  6×256K  (beast)"
gpu         = "6000pro"
model_repo  = "unsloth/Qwen3.6-35B-A3B-GGUF"
model_quant = "UD-Q8_K_XL"
ctx         = 1572864
parallel    = 6
kv_type     = "q8_0"
min_disk_gb = 80
description = "Max quality. 6 slots × 256K each. ~58GiB used. Main agent + 5 sub-agents all at max context."

[[recipes]]
name        = "qwen36-35b-moe-q6-6000pro"
label       = "Qwen3.6-35B-A3B MoE  Q6_K  4×256K"
gpu         = "6000pro"
model_repo  = "unsloth/Qwen3.6-35B-A3B-GGUF"
model_quant = "UD-Q6_K_XL"
ctx         = 1048576
parallel    = 4
kv_type     = "q8_0"
description = "Conservative 6000 Pro: Q6 weights, 4 slots × 256K, faster per-stream."

[[recipes]]
name        = "qwen36-27b-dense-q8-6000pro"
label       = "Qwen3.6-27B  Q8_K  4×128K"
gpu         = "6000pro"
model_repo  = "unsloth/Qwen3.6-27B-GGUF"
model_quant = "UD-Q8_K_XL"
ctx         = 524288
parallel    = 4
kv_type     = "q8_0"
description = "Dense 27B at full Q8 quality. Dense KV is fat — 4×128K is the sweet spot."

