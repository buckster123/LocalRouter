# recipes.toml — GPU tier + model recipe catalogue for vastai-gguf-launcher
#
# Edit this file to add GPUs or models. The manager reads it at startup.
# No Python or bash editing needed for new tiers or recipes.
#
# GPU tier fields:
#   vast_names   list of Vast.ai gpu_name strings for this tier (required)
#   label        display name in the TUI (required)
#   max_price    $/hr ceiling for offer search (required)
#   min_disk_gb  minimum container disk GB (default 60)
#   image_type   "prebuilt" | "builder"  (default "prebuilt")
#                prebuilt = fat binary image, fast cold start (~2 min pull)
#                builder  = compiles llama.cpp at runtime for exact SM arch (~8-12 min extra)
#   min_cuda     minimum cuda_vers for offer filter (default "12.8")
#   num_gpus     GPUs per instance (default 1)
#
# Recipe fields:
#   name         unique slug (required)
#   label        display name in TUI (required)
#   gpu          must match a gpu_tiers key (required)
#   model_repo   HuggingFace repo (required)
#   model_quant  quant tag matched as substring against filenames (required)
#   ctx          total KV pool in tokens (required)
#   parallel     concurrent decode slots, each gets ctx/parallel tokens (default 1)
#   kv_type      q8_0 | q4_0 | bf16 (default q8_0)
#   min_disk_gb  override tier default disk for heavy recipes
#   image_type   override tier default image type
#   description  free text shown in TUI

# ── docker images ─────────────────────────────────────────────────────────────
[docker]
# prebuilt: fat binary SM89 (4090) + SM120 (5090/6000Pro), fast cold start
prebuilt = "ghcr.io/buckster123/vastai-gguf:prebuilt"
# builder: CUDA dev toolchain only — compiles llama.cpp for exact SM arch at boot
builder  = "ghcr.io/buckster123/vastai-gguf:builder"
# legacy alias kept for backward compat while new images are being built
prebuilt_legacy = "ghcr.io/buckster123/qwen36-llamacpp:latest"

# ── consumer / workstation GPU tiers ─────────────────────────────────────────

[gpu_tiers.5090]
vast_names  = ["RTX_5090"]
label       = "RTX 5090 32GB   (~$0.34/hr)"
max_price   = "0.55"
min_disk_gb = 60
image_type  = "prebuilt"
vram_gb     = 32

[gpu_tiers.4090]
vast_names  = ["RTX_4090"]
label       = "RTX 4090 24GB   (~$0.28/hr)"
max_price   = "0.45"
min_disk_gb = 60
image_type  = "prebuilt"
vram_gb     = 24

[gpu_tiers.6000pro]
vast_names  = ["RTX_PRO_6000_WS", "RTX_PRO_6000_S"]
label       = "RTX PRO 6000 96GB  (~$0.93/hr)"
max_price   = "1.60"
min_disk_gb = 80
image_type  = "prebuilt"
vram_gb     = 96

# RTX 5090 in a datacenter (rare but exists — same card, better host hw)
[gpu_tiers.5090-dc]
vast_names  = ["RTX_5090"]
label       = "RTX 5090 32GB  DC  (~$0.40/hr)"
max_price   = "0.60"
min_disk_gb = 60
image_type  = "prebuilt"
vram_gb     = 32

